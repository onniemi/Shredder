# 关闭空白 issue,强制走模板,让 triage 成本可控
blank_issues_enabled: false

contact_links:
  - name: 🔒 安全漏洞报告
    url: https://github.com/onniemi/Shredder/security/advisories/new
    about: |
      护栏绕过、误删、越权、数据残留、日志泄露等问题请走 GitHub Private Vulnerability Reporting,
      不要在公开 issue 里贴可复现 PoC。详见 SECURITY.md。
  - name: 💬 使用问题 / 讨论
    url: https://github.com/onniemi/Shredder/discussions
    about: |
      不是 bug 也不是新功能,只是想问怎么用、求建议、聊设计?去 Discussions。
