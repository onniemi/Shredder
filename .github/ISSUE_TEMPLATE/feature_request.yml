name: 功能建议
description: 提议新功能 / 新算法 / 体验改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提议!请先搜索已有 issue,避免重复。

        ⚠️ 安全相关的设计变更(护栏放宽、默认值调整等)请同时阅读 [SECURITY.md](../blob/main/SECURITY.md) 的「安全边界」段落,在描述里说明对边界的影响。

  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题?
      description: 描述当前使用中遇到的场景或不便。避免直接写「我想要 X」,先讲清「现在为什么不够」。
      placeholder: 例:CI 里粉碎临时产物时,希望脚本能从 stdin 读路径列表而不是逐个传参。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议的方案
      description: 你期望的行为 / 接口长什么样?CLI 加什么参数?UI 加哪个按钮?
      placeholder: 例:`shredder --from-stdin --algo dod3 -y < paths.txt`,逐行读路径,空行跳过。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案(可选)
      placeholder: 例:可以用 PowerShell `ForEach-Object { shredder $_ }`,但慢且没法共享单次确认。

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      multiple: true
      options:
        - CLI (Shredder.Cli)
        - WPF GUI (Shredder.App)
        - 核心算法 / 服务 (Shredder.Core)
        - 资源管理器集成 (Shredder.Integration)
        - 文档 / 安装 / 发布流程
        - 不确定

  - type: checkboxes
    id: security
    attributes:
      label: 安全自查
      options:
        - label: 我确认此功能**不会**让 `--yes` 绕过 `Forbidden` 级别的拦截。
        - label: 我确认此功能**不会**改变系统目录 / 盘符根的硬拒绝行为。
        - label: 我确认此功能**不会**默认记录原始文件路径到日志。
        - label: 不适用 / 不涉及安全边界。

  - type: textarea
    id: notes
    attributes:
      label: 其他备注(可选)
