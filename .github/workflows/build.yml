name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  build:
    # net10.0-windows (WPF) 必须 Windows runner
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Shredder.sln

      - name: Build
        # Directory.Build.props 强制 TreatWarningsAsErrors,任何 warning 都会让这一步红
        run: dotnet build src/Shredder.sln -c Release --no-restore

      - name: Test
        # 显式指向 Tests 项目,避免拉起 GUI 项目 host
        run: dotnet test src/Shredder.Tests/Shredder.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Resolve version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: ver
        shell: bash
        run: |
          # github.ref_name = "v0.2.0" → version = "0.2.0"
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Publish CLI full (self-contained)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.Cli/Shredder.Cli.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/cli-full

      - name: Publish CLI light (requires .NET runtime)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.Cli/Shredder.Cli.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/cli-light

      - name: Publish WPF App full (self-contained)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/app-full

      - name: Publish WPF App light (requires .NET Desktop Runtime)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/app-light

      - name: Publish WPF App simple (minimal UI, self-contained)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:SimpleUi=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/app-simple

      - name: Zip release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path publish/cli-full/* `
            -DestinationPath shredder-cli-v${{ steps.ver.outputs.version }}-win-x64-full.zip
          Compress-Archive -Path publish/cli-light/* `
            -DestinationPath shredder-cli-v${{ steps.ver.outputs.version }}-win-x64-light.zip
          Compress-Archive -Path publish/app-full/* `
            -DestinationPath shredder-app-v${{ steps.ver.outputs.version }}-win-x64-full.zip
          Compress-Archive -Path publish/app-light/* `
            -DestinationPath shredder-app-v${{ steps.ver.outputs.version }}-win-x64-light.zip
          Compress-Archive -Path publish/app-simple/* `
            -DestinationPath shredder-app-v${{ steps.ver.outputs.version }}-win-x64-simple.zip

      - name: Compute SHA-256 checksums
        if: startsWith(github.ref, 'refs/tags/v')
        # 输出格式与 GNU `sha256sum` 兼容:`<hex>  <filename>\n`,用户可 `sha256sum -c xxx.sha256` 校验。
        # 必须 ASCII 编码(无 BOM)+ LF 行尾;Out-File 会写 CRLF,导致 GNU sha256sum 把 \r 当文件名一部分,
        # 所以用 [System.IO.File]::WriteAllText 显式控制编码和换行。
        shell: pwsh
        run: |
          $zips = @(
            "shredder-cli-v${{ steps.ver.outputs.version }}-win-x64-full.zip",
            "shredder-cli-v${{ steps.ver.outputs.version }}-win-x64-light.zip",
            "shredder-app-v${{ steps.ver.outputs.version }}-win-x64-full.zip",
            "shredder-app-v${{ steps.ver.outputs.version }}-win-x64-light.zip",
            "shredder-app-v${{ steps.ver.outputs.version }}-win-x64-simple.zip"
          )
          foreach ($zip in $zips) {
            $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
            [System.IO.File]::WriteAllText("$zip.sha256", "$hash  $zip`n", [System.Text.Encoding]::ASCII)
            Write-Host "$zip SHA-256: $hash"
          }

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            shredder-cli-v${{ steps.ver.outputs.version }}-win-x64-full.zip
            shredder-cli-v${{ steps.ver.outputs.version }}-win-x64-light.zip
            shredder-app-v${{ steps.ver.outputs.version }}-win-x64-full.zip
            shredder-app-v${{ steps.ver.outputs.version }}-win-x64-light.zip
            shredder-app-v${{ steps.ver.outputs.version }}-win-x64-simple.zip
            shredder-cli-v${{ steps.ver.outputs.version }}-win-x64-full.zip.sha256
            shredder-cli-v${{ steps.ver.outputs.version }}-win-x64-light.zip.sha256
            shredder-app-v${{ steps.ver.outputs.version }}-win-x64-full.zip.sha256
            shredder-app-v${{ steps.ver.outputs.version }}-win-x64-light.zip.sha256
            shredder-app-v${{ steps.ver.outputs.version }}-win-x64-simple.zip.sha256
