name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  build:
    # net10.0-windows (WPF) 必须 Windows runner
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Shredder.sln

      - name: Build
        # Directory.Build.props 强制 TreatWarningsAsErrors,任何 warning 都会让这一步红
        run: dotnet build src/Shredder.sln -c Release --no-restore

      - name: Test
        # 显式指向 Tests 项目,避免拉起 GUI 项目 host
        run: dotnet test src/Shredder.Tests/Shredder.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Resolve version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: ver
        shell: bash
        run: |
          # github.ref_name = "v0.2.0" → version = "0.2.0"
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Publish simple UI full (self-contained)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:SimpleUi=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/simple-ui-full

      - name: Publish simple UI light (requires .NET Desktop Runtime)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:SimpleUi=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/simple-ui-light

      - name: Publish full UI full (self-contained)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/full-ui-full

      - name: Publish full UI light (requires .NET Desktop Runtime)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/full-ui-light

      - name: Zip release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path publish/simple-ui-full/* `
            -DestinationPath shredder-simple-ui-v${{ steps.ver.outputs.version }}-win-x64-full.zip
          Compress-Archive -Path publish/simple-ui-light/* `
            -DestinationPath shredder-simple-ui-v${{ steps.ver.outputs.version }}-win-x64-light.zip
          Compress-Archive -Path publish/full-ui-full/* `
            -DestinationPath shredder-full-ui-v${{ steps.ver.outputs.version }}-win-x64-full.zip
          Compress-Archive -Path publish/full-ui-light/* `
            -DestinationPath shredder-full-ui-v${{ steps.ver.outputs.version }}-win-x64-light.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## 下载哪个版本

            | 文件 | 适合谁 | 说明 |
            | --- | --- | --- |
            | `shredder-simple-ui-v${{ steps.ver.outputs.version }}-win-x64-full.zip` | 想要最简单界面,且不想安装运行时的用户 | 简约界面,只显示文件/文件夹粉碎,自带 .NET 10 桌面运行时,体积较大 |
            | `shredder-simple-ui-v${{ steps.ver.outputs.version }}-win-x64-light.zip` | 想要最简单界面,且已安装 .NET 10 Desktop Runtime 的用户 | 简约界面,体积小,需要本机已有运行时 |
            | `shredder-full-ui-v${{ steps.ver.outputs.version }}-win-x64-full.zip` | 想要完整图形界面,且不想安装运行时的用户 | 完整图形界面,自带 .NET 10 桌面运行时,体积较大 |
            | `shredder-full-ui-v${{ steps.ver.outputs.version }}-win-x64-light.zip` | 想要完整图形界面,且已安装 .NET 10 Desktop Runtime 的用户 | 完整图形界面,体积小,需要本机已有运行时 |

            拿不准就下载 `simple-ui full`。已经安装 .NET 10 Desktop Runtime 的用户可下载 `light` 小体积版。

            GitHub 自动附带的 `Source code` 是源码包，普通用户不用下载。
          files: |
            shredder-simple-ui-v${{ steps.ver.outputs.version }}-win-x64-full.zip
            shredder-simple-ui-v${{ steps.ver.outputs.version }}-win-x64-light.zip
            shredder-full-ui-v${{ steps.ver.outputs.version }}-win-x64-full.zip
            shredder-full-ui-v${{ steps.ver.outputs.version }}-win-x64-light.zip

      - name: Remove old release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            const keep = new Set([
              `shredder-simple-ui-v${version}-win-x64-full.zip`,
              `shredder-simple-ui-v${version}-win-x64-light.zip`,
              `shredder-full-ui-v${version}-win-x64-full.zip`,
              `shredder-full-ui-v${version}-win-x64-light.zip`,
            ]);
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            for (const asset of release.assets) {
              if (keep.has(asset.name)) continue;

              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }
