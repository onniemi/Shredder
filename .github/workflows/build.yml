name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:

jobs:
  build:
    # net10.0-windows (WPF) 必须 Windows runner
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Shredder.sln

      - name: Build
        # Directory.Build.props 强制 TreatWarningsAsErrors,任何 warning 都会让这一步红
        run: dotnet build src/Shredder.sln -c Release --no-restore

      - name: Test
        # 显式指向 Tests 项目,避免拉起 GUI 项目 host
        run: dotnet test src/Shredder.Tests/Shredder.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

  release:
    # 只在 push v* tag 时跑;v0.2.0 / v0.2.0-rc1 都匹配
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write  # 创建 Release / 上传 asset 必须显式提权

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          # github.ref_name = "v0.2.0" → version = "0.2.0"
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Restore
        run: dotnet restore src/Shredder.sln

      - name: Publish CLI (shredder.exe)
        shell: bash
        run: |
          dotnet publish src/Shredder.Cli/Shredder.Cli.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/cli

      - name: Publish WPF App (Shredder.exe)
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/app

      - name: Zip CLI
        shell: pwsh
        run: |
          Compress-Archive -Path publish/cli/* `
            -DestinationPath shredder-cli-v${{ steps.ver.outputs.version }}-win-x64.zip

      - name: Zip WPF App
        shell: pwsh
        run: |
          Compress-Archive -Path publish/app/* `
            -DestinationPath shredder-app-v${{ steps.ver.outputs.version }}-win-x64.zip

      - name: Compute SHA-256 checksums
        # 输出格式与 GNU `sha256sum` 兼容:`<hex>  <filename>\n`,用户可 `sha256sum -c xxx.sha256` 校验。
        # 必须 ASCII 编码(无 BOM)+ LF 行尾;Out-File 会写 CRLF,导致 GNU sha256sum 把 \r 当文件名一部分,
        # 所以用 [System.IO.File]::WriteAllText 显式控制编码和换行。
        shell: pwsh
        run: |
          $cliZip = "shredder-cli-v${{ steps.ver.outputs.version }}-win-x64.zip"
          $appZip = "shredder-app-v${{ steps.ver.outputs.version }}-win-x64.zip"
          $cliHash = (Get-FileHash $cliZip -Algorithm SHA256).Hash.ToLower()
          $appHash = (Get-FileHash $appZip -Algorithm SHA256).Hash.ToLower()
          [System.IO.File]::WriteAllText("$cliZip.sha256", "$cliHash  $cliZip`n", [System.Text.Encoding]::ASCII)
          [System.IO.File]::WriteAllText("$appZip.sha256", "$appHash  $appZip`n", [System.Text.Encoding]::ASCII)
          Write-Host "CLI SHA-256: $cliHash"
          Write-Host "APP SHA-256: $appHash"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            shredder-cli-v${{ steps.ver.outputs.version }}-win-x64.zip
            shredder-app-v${{ steps.ver.outputs.version }}-win-x64.zip
            shredder-cli-v${{ steps.ver.outputs.version }}-win-x64.zip.sha256
            shredder-app-v${{ steps.ver.outputs.version }}-win-x64.zip.sha256
