name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  build:
    # net10.0-windows (WPF) 必须 Windows runner
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Shredder.sln

      - name: Build
        # Directory.Build.props 强制 TreatWarningsAsErrors,任何 warning 都会让这一步红
        run: dotnet build src/Shredder.sln -c Release --no-restore

      - name: Test
        # 显式指向 Tests 项目,避免拉起 GUI 项目 host
        run: dotnet test src/Shredder.Tests/Shredder.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Resolve version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: ver
        shell: bash
        run: |
          # github.ref_name = "v0.2.0" → version = "0.2.0"
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Publish simple UI full (self-contained)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:SimpleUi=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/simple-ui-full

      - name: Publish simple UI light (requires .NET Desktop Runtime)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:SimpleUi=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/simple-ui-light

      - name: Publish full UI full (self-contained)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/standard-ui-full

      - name: Publish full UI light (requires .NET Desktop Runtime)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          dotnet publish src/Shredder.App/Shredder.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/standard-ui-light

      - name: Zip release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packages = @(
            @{ Source = 'publish/simple-ui-light';    Folder = 'shredder_simple';       Zip = 'shredder_simple.zip';       Exe = 'shredder_simple.exe' },
            @{ Source = 'publish/simple-ui-full';     Folder = 'shredder_simple_net10'; Zip = 'shredder_simple_net10.zip'; Exe = 'shredder_simple.exe' },
            @{ Source = 'publish/standard-ui-light';  Folder = 'shredder_full';         Zip = 'shredder_full.zip';         Exe = 'shredder_full.exe' },
            @{ Source = 'publish/standard-ui-full';   Folder = 'shredder_full_net10';   Zip = 'shredder_full_net10.zip';   Exe = 'shredder_full.exe' }
          )

          New-Item -ItemType Directory -Path release -Force | Out-Null

          foreach ($package in $packages) {
            $folderPath = Join-Path 'release' $package.Folder
            if (Test-Path -LiteralPath $folderPath) {
              Remove-Item -LiteralPath $folderPath -Recurse -Force
            }

            New-Item -ItemType Directory -Path $folderPath -Force | Out-Null
            Copy-Item -Path (Join-Path $package.Source '*') -Destination $folderPath -Recurse -Force
            Move-Item -LiteralPath (Join-Path $folderPath 'Shredder.exe') -Destination (Join-Path $folderPath $package.Exe) -Force
            Compress-Archive -Path $folderPath -DestinationPath (Join-Path 'release' $package.Zip) -Force
          }

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## 下载哪个版本

            - `shredder_simple.zip`:简约界面,需要已安装 .NET 10 Desktop Runtime,体积小,解压后运行 `shredder_simple.exe`
            - `shredder_simple_net10.zip`:简约界面,自带 .NET 10,体积大,解压后运行 `shredder_simple.exe`
            - `shredder_full.zip`:完整图形界面,需要已安装 .NET 10 Desktop Runtime,体积小,解压后运行 `shredder_full.exe`
            - `shredder_full_net10.zip`:完整图形界面,自带 .NET 10,体积大,解压后运行 `shredder_full.exe`

            拿不准就下载 `shredder_simple_net10.zip`。已经安装 .NET 10 Desktop Runtime 的用户可下载不带 `_net10` 的小体积版。

            GitHub 自动附带的 `Source code` 是源码包，普通用户不用下载。
          files: |
            release/shredder_simple.zip
            release/shredder_simple_net10.zip
            release/shredder_full.zip
            release/shredder_full_net10.zip

      - name: Update release notes
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        with:
          script: |
            const version = process.env.VERSION;
            const tag = context.ref.replace('refs/tags/', '');
            const body = [
              '## 下载哪个版本',
              '',
              '- `shredder_simple.zip`:简约界面,需要已安装 .NET 10 Desktop Runtime,体积小,解压后运行 `shredder_simple.exe`',
              '- `shredder_simple_net10.zip`:简约界面,自带 .NET 10,体积大,解压后运行 `shredder_simple.exe`',
              '- `shredder_full.zip`:完整图形界面,需要已安装 .NET 10 Desktop Runtime,体积小,解压后运行 `shredder_full.exe`',
              '- `shredder_full_net10.zip`:完整图形界面,自带 .NET 10,体积大,解压后运行 `shredder_full.exe`',
              '',
              '拿不准就下载 `shredder_simple_net10.zip`。已经安装 .NET 10 Desktop Runtime 的用户可下载不带 `_net10` 的小体积版。',
              '',
              'GitHub 自动附带的 `Source code` 是源码包,普通用户不用下载。',
            ].join('\n');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body,
            });

      - name: Remove old release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const keep = new Set([
              'shredder_simple.zip',
              'shredder_simple_net10.zip',
              'shredder_full.zip',
              'shredder_full_net10.zip',
            ]);
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            for (const asset of release.assets) {
              if (keep.has(asset.name)) continue;

              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }
